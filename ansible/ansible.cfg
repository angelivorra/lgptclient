[defaults]
pipelining = true
forks = 10
gathering = explicit
# Silenciar warnings: descubrimiento del interprete de Python y deprecaciones
# internas de los modulos de Ansible.
interpreter_python = auto_silent
deprecation_warnings = False

[ssh_connection]
pipelining = true
ssh_args = -o ControlMaster=auto -o ControlPersist=300s -o PreferredAuthentications=publickey
