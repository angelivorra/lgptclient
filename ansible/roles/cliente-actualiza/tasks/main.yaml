---
- name: Stop cliente service
  become: true
  ansible.builtin.service:
    name: cliente
    state: stopped
  failed_when: false

- name: Check whether the venv already exists
  ansible.builtin.stat:
    path: /home/angel/venv/bin/python
  register: venv_stat

- name: Remove existing venv directory (forzado con entorno_python)
  ansible.builtin.file:
    path: /home/angel/venv
    state: absent
  when: entorno_python | default(false) | bool

- name: Create Python virtual environment (si no existe o forzado)
  ansible.builtin.command: /usr/bin/python3 -m venv /home/angel/venv
  register: venv_created
  when: entorno_python | default(false) | bool or not venv_stat.stat.exists

- name: Copy requirements.txt
  ansible.builtin.copy:
    src: "/home/angel/lgptclient/requirements_{{ inventory_hostname  }}.txt"
    dest: /home/angel/requirements.txt
    owner: angel
    group: angel
  register: requirements_file

- name: Install Python dependencies (solo si cambiaron o venv nuevo)
  ansible.builtin.pip:
    requirements: /home/angel/requirements.txt
    virtualenv: /home/angel/venv
    extra_args: "--cache-dir /home/angel/.pip-cache"
  when: requirements_file.changed or venv_created.changed

- name: Sync client files
  synchronize:
    src: /home/angel/lgptclient/bin/cliente_final/
    dest: /home/angel/bin/
    delete: yes
    rsync_opts:
      - "--chown=angel:angel"

- name: Copy client configuration
  ansible.builtin.copy:
    src: "/home/angel/lgptclient/bin/cliente.{{ inventory_hostname  }}.json"
    dest: /home/angel/bin/config.json
    owner: angel
    group: angel

- name: Generate image binary files locally
  ansible.builtin.command:
    cmd: "/home/angel/lgptclient/venv/bin/python /home/angel/lgptclient/bin/genera.py {{ inventory_hostname }}"
  delegate_to: localhost

- name: Sync image binary files
  synchronize:
    src: "/home/angel/lgptclient/img_output/{{ inventory_hostname }}/"
    dest: /home/angel/images/
    delete: yes
    rsync_opts:
      - "--chown=angel:angel"

- name: Configure cliente service
  become: true
  template:
    src: cliente.service.j2
    dest: /etc/systemd/system/cliente.service
    owner: root
    group: root
    mode: '0644'
  register: cliente_unit

- name: Enable and start the cliente service
  become: true
  systemd:
    name: cliente.service
    enabled: yes
    state: started
    # Solo recargar systemd si la unidad cambió (evita daemon-reload innecesario)
    daemon_reload: "{{ cliente_unit.changed }}"