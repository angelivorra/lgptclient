<!doctype html>
<html lang="es" data-theme="night">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.min.css" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="{{ url_for('static', filename='jquery-3.7.1.min.js') }}"></script>
  <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='favicon-32x32.png') }}">
  <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='favicon-16x16.png') }}">
  <link rel="manifest" href="{{ url_for('static', filename='site.webmanifest') }}">
  <meta name="mobile-web-app-capable" content="yes">
  <title>{{ name }} - Robot</title>
  <script>
    $(document).ready(function () {
      $("#btn-limpia").click(function () {
        $.post("/limpia", function () {
          fetchRobotData();
        });
      });

      function formatNumber(num, decimals) {
        decimals = decimals !== undefined ? decimals : 2;
        if (typeof num === 'number' && !isNaN(num)) {
          return num.toFixed(decimals);
        }
        return 'N/A';
      }

      function fetchRobotData() {
        $.getJSON("/robot_data", function (data) {
          $("#current_time").text(data.current_time);

          // Pantalla
          var pantallaTotal = data.num_registros_pantalla || 0;
          var pantallaOk = data.signals_ok_pantalla || 0;
          $("#pantalla-progress").attr('value', pantallaOk).attr('max', pantallaTotal);
          if (pantallaTotal > 0) {
            var pctPantalla = (pantallaOk / pantallaTotal) * 100;
            $("#pantalla-progress-label-text").text(
              pantallaOk + " / " + pantallaTotal +
              " | OK " + formatNumber(pctPantalla, 1) + "%" +
              " | media " + formatNumber(data.media_diff_pantalla, 1) + "ms" +
              " | max " + formatNumber(data.max_diff_pantalla, 1) + "ms"
            );
          } else {
            $("#pantalla-progress-label-text").text("Sin datos pantalla.");
          }

          // Batería
          var bateriaTotal = data.num_registros_bateria || 0;
          var bateriaOk = data.signals_ok_bateria || 0;
          $("#bateria-progress").attr('value', bateriaOk).attr('max', bateriaTotal);
          if (bateriaTotal > 0) {
            var pctBateria = (bateriaOk / bateriaTotal) * 100;
            $("#bateria-progress-label-text").text(
              bateriaOk + " / " + bateriaTotal +
              " | OK " + formatNumber(pctBateria, 1) + "%" +
              " | media " + formatNumber(data.media_diff_bateria, 1) + "ms" +
              " | max " + formatNumber(data.max_diff_bateria, 1) + "ms"
            );
          } else {
            $("#bateria-progress-label-text").text("Sin datos batería.");
          }

          // CPU
          var cpuUsage = data.cpu_usage_percent || 0;
          $("#cpu-progress").attr('value', cpuUsage);
          $("#cpu-progress-label-text").text("CPU: " + formatNumber(cpuUsage, 1) + "%");

          // Disco
          var diskUsage = data.disk_usage_percent || 0;
          $("#disk-progress").attr('value', diskUsage);
          $("#disk-progress-label-text").text("Disco: " + formatNumber(diskUsage, 1) + "% (" + data.disk_usage_string + ")");

          // RAM
          var ramUsage = data.ram_usage_percent || 0;
          $("#ram-progress").attr('value', ramUsage);
          $("#ram-progress-label-text").text("RAM: " + formatNumber(ramUsage, 1) + "% (" + data.ram_usage_string + ")");

          // Detalles Pantalla
          $("#num_registros_pantalla").val(data.num_registros_pantalla !== null ? data.num_registros_pantalla : 'N/A');
          $("#signals_ok_pantalla").val(data.signals_ok_pantalla !== null ? data.signals_ok_pantalla : 'N/A');
          $("#media_diff_pantalla").val(formatNumber(data.media_diff_pantalla));
          $("#max_diff_pantalla").val(formatNumber(data.max_diff_pantalla));
          $("#min_diff_pantalla").val(formatNumber(data.min_diff_pantalla));

          // Detalles Batería
          $("#num_registros_bateria").val(data.num_registros_bateria !== null ? data.num_registros_bateria : 'N/A');
          $("#signals_ok_bateria").val(data.signals_ok_bateria !== null ? data.signals_ok_bateria : 'N/A');
          $("#media_diff_bateria").val(formatNumber(data.media_diff_bateria));
          $("#max_diff_bateria").val(formatNumber(data.max_diff_bateria));
          $("#min_diff_bateria").val(formatNumber(data.min_diff_bateria));

        }).fail(function () {
          $("#pantalla-progress-label-text").text("Error datos pantalla.");
          $("#bateria-progress-label-text").text("Error datos batería.");
          $("#cpu-progress-label-text").text("Error CPU.");
          $("#disk-progress-label-text").text("Error disco.");
          $("#ram-progress-label-text").text("Error RAM.");
        });
      }

      fetchRobotData();
      setInterval(fetchRobotData, 1000);
    });
  </script>
</head>

<body class="min-h-screen bg-base-100">

  <!-- Navbar -->
  <div class="navbar bg-base-300 sticky top-0 z-40 shadow-md">
    <div class="navbar-start">
      <button class="btn btn-ghost btn-sm" onclick="history.back()">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
        </svg>
      </button>
    </div>
    <div class="navbar-center">
      <span class="text-lg font-bold uppercase">{{ name }}</span>
    </div>
    <div class="navbar-end pr-2">
      <span class="text-xs text-base-content/50 font-mono" id="current_time">--:--:--</span>
    </div>
  </div>

  <div class="p-4 max-w-2xl mx-auto space-y-4">

    <!-- Calidad de señal -->
    <div class="card bg-base-200">
      <div class="card-body p-4 space-y-3">
        <h3 class="card-title text-base">Calidad de Señal</h3>

        <div>
          <div class="flex justify-between text-xs text-base-content/70 mb-1">
            <span class="font-semibold">Pantalla</span>
          </div>
          <progress id="pantalla-progress" class="progress progress-primary w-full" value="0" max="100"></progress>
          <p id="pantalla-progress-label-text" class="text-xs text-base-content/60 mt-1 font-mono">Cargando...</p>
        </div>

        <div>
          <div class="flex justify-between text-xs text-base-content/70 mb-1">
            <span class="font-semibold">Batería</span>
          </div>
          <progress id="bateria-progress" class="progress progress-secondary w-full" value="0" max="100"></progress>
          <p id="bateria-progress-label-text" class="text-xs text-base-content/60 mt-1 font-mono">Cargando...</p>
        </div>
      </div>
    </div>

    <!-- Uso del sistema -->
    <div class="card bg-base-200">
      <div class="card-body p-4 space-y-3">
        <h3 class="card-title text-base">Uso del Sistema</h3>

        <div>
          <progress id="cpu-progress" class="progress progress-warning w-full" value="0" max="100"></progress>
          <p id="cpu-progress-label-text" class="text-xs text-base-content/60 mt-1 font-mono">Cargando...</p>
        </div>
        <div>
          <progress id="disk-progress" class="progress progress-info w-full" value="0" max="100"></progress>
          <p id="disk-progress-label-text" class="text-xs text-base-content/60 mt-1 font-mono">Cargando...</p>
        </div>
        <div>
          <progress id="ram-progress" class="progress progress-accent w-full" value="0" max="100"></progress>
          <p id="ram-progress-label-text" class="text-xs text-base-content/60 mt-1 font-mono">Cargando...</p>
        </div>
      </div>
    </div>

    <!-- Detalles por evento -->
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">

      <div class="card bg-base-200">
        <div class="card-body p-4">
          <h3 class="card-title text-sm">Pantalla</h3>
          <div class="space-y-1">
            <div class="flex justify-between text-xs">
              <span class="text-base-content/60">Registros</span>
              <input type="text" id="num_registros_pantalla" readonly class="input input-xs input-ghost w-20 text-right font-mono" />
            </div>
            <div class="flex justify-between text-xs">
              <span class="text-base-content/60">OK &lt;25ms</span>
              <input type="text" id="signals_ok_pantalla" readonly class="input input-xs input-ghost w-20 text-right font-mono" />
            </div>
            <div class="flex justify-between text-xs">
              <span class="text-base-content/60">Media</span>
              <input type="text" id="media_diff_pantalla" readonly class="input input-xs input-ghost w-20 text-right font-mono" placeholder="ms" />
            </div>
            <div class="flex justify-between text-xs">
              <span class="text-base-content/60">Máx</span>
              <input type="text" id="max_diff_pantalla" readonly class="input input-xs input-ghost w-20 text-right font-mono" placeholder="ms" />
            </div>
            <div class="flex justify-between text-xs">
              <span class="text-base-content/60">Mín</span>
              <input type="text" id="min_diff_pantalla" readonly class="input input-xs input-ghost w-20 text-right font-mono" placeholder="ms" />
            </div>
          </div>
        </div>
      </div>

      <div class="card bg-base-200">
        <div class="card-body p-4">
          <h3 class="card-title text-sm">Batería</h3>
          <div class="space-y-1">
            <div class="flex justify-between text-xs">
              <span class="text-base-content/60">Registros</span>
              <input type="text" id="num_registros_bateria" readonly class="input input-xs input-ghost w-20 text-right font-mono" />
            </div>
            <div class="flex justify-between text-xs">
              <span class="text-base-content/60">OK &lt;25ms</span>
              <input type="text" id="signals_ok_bateria" readonly class="input input-xs input-ghost w-20 text-right font-mono" />
            </div>
            <div class="flex justify-between text-xs">
              <span class="text-base-content/60">Media</span>
              <input type="text" id="media_diff_bateria" readonly class="input input-xs input-ghost w-20 text-right font-mono" placeholder="ms" />
            </div>
            <div class="flex justify-between text-xs">
              <span class="text-base-content/60">Máx</span>
              <input type="text" id="max_diff_bateria" readonly class="input input-xs input-ghost w-20 text-right font-mono" placeholder="ms" />
            </div>
            <div class="flex justify-between text-xs">
              <span class="text-base-content/60">Mín</span>
              <input type="text" id="min_diff_bateria" readonly class="input input-xs input-ghost w-20 text-right font-mono" placeholder="ms" />
            </div>
          </div>
        </div>
      </div>

    </div>

    <!-- Acciones -->
    <button id="btn-limpia" class="btn btn-outline btn-sm w-full">Borrar datos debug</button>

  </div>

</body>
</html>
