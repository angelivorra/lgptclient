<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>{{ name }} - Robot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='favicon-32x32.png') }}">
  <meta name="mobile-web-app-capable" content="yes">
  <style>body { margin: 0; background: #0a0e1a; }</style>
</head>
<body>
  <div id="root"></div>

  <script id="flask-data" type="application/json">
  { "name": {{ name | tojson }} }
  </script>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@mui/material@5/umd/material-ui.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">{% raw %}
  const {
    createTheme, ThemeProvider, CssBaseline,
    AppBar, Toolbar, Typography, Box,
    Card, CardContent, LinearProgress,
    Button, IconButton, Grid, Stack, Divider, Chip
  } = MaterialUI;

  const theme = createTheme({
    palette: {
      mode: 'dark',
      primary:    { main: '#5c6bc0' },
      secondary:  { main: '#ab47bc' },
      warning:    { main: '#ffa726' },
      info:       { main: '#29b6f6' },
      background: { default: '#0a0e1a', paper: '#141929' },
    },
    shape: { borderRadius: 12 },
    typography: { fontFamily: 'Roboto, sans-serif' },
  });

  const D = JSON.parse(document.getElementById('flask-data').textContent);

  function fmt(n, d = 2) {
    return typeof n === 'number' && !isNaN(n) ? n.toFixed(d) : 'N/A';
  }

  const EMPTY = {
    current_time: '--',
    num_registros_pantalla: 0, signals_ok_pantalla: 0,
    media_diff_pantalla: null, max_diff_pantalla: null, min_diff_pantalla: null,
    num_registros_bateria: 0, signals_ok_bateria: 0,
    media_diff_bateria: null, max_diff_bateria: null, min_diff_bateria: null,
    cpu_usage_percent: 0, disk_usage_percent: 0, ram_usage_percent: 0,
    disk_usage_string: '—', ram_usage_string: '—',
  };

  // ── Signal quality bar ────────────────────────────────────────────────────

  function SignalBar({ label, total, ok, media, max, color }) {
    const pct = total > 0 ? (ok / total) * 100 : 0;
    return (
      <Box>
        <Box sx={{ display: 'flex', justifyContent: 'space-between', mb: 0.5 }}>
          <Typography variant="caption" sx={{ fontWeight: 600 }}>{label}</Typography>
          <Typography variant="caption" color="text.secondary" sx={{ fontFamily: 'monospace' }}>
            {total > 0
              ? `${ok}/${total} · ${fmt(pct, 1)}% · ${fmt(media, 1)}ms avg · ${fmt(max, 1)}ms max`
              : 'Sin datos'}
          </Typography>
        </Box>
        <LinearProgress
          variant="determinate"
          value={Math.min(pct, 100)}
          color={color}
          sx={{ height: 8, borderRadius: 4 }}
        />
      </Box>
    );
  }

  // ── System usage bar ──────────────────────────────────────────────────────

  function UsageBar({ label, value, detail, color }) {
    return (
      <Box>
        <Box sx={{ display: 'flex', justifyContent: 'space-between', mb: 0.5 }}>
          <Typography variant="caption" sx={{ fontWeight: 600 }}>{label}</Typography>
          <Typography variant="caption" color="text.secondary" sx={{ fontFamily: 'monospace' }}>
            {fmt(value, 1)}%{detail ? ` · ${detail}` : ''}
          </Typography>
        </Box>
        <LinearProgress
          variant="determinate"
          value={Math.min(value || 0, 100)}
          color={color}
          sx={{ height: 8, borderRadius: 4 }}
        />
      </Box>
    );
  }

  // ── Detail row ────────────────────────────────────────────────────────────

  function DetailRow({ label, value }) {
    return (
      <Box sx={{ display: 'flex', justifyContent: 'space-between', py: 0.25 }}>
        <Typography variant="caption" color="text.secondary">{label}</Typography>
        <Typography variant="caption" sx={{ fontFamily: 'monospace' }}>{value}</Typography>
      </Box>
    );
  }

  // ── Root App ──────────────────────────────────────────────────────────────

  function App() {
    const [data,    setData]    = React.useState(EMPTY);
    const [healthy, setHealthy] = React.useState(null); // null=checking, true=ok, false=fail

    React.useEffect(() => {
      const tick = () => {
        fetch('/robot_data')
          .then(r => r.json())
          .then(d => setData(d))
          .catch(() => {});
      };
      tick();
      const id = setInterval(tick, 1000);
      return () => clearInterval(id);
    }, []);

    React.useEffect(() => {
      const check = () => {
        fetch('/api/health', { signal: AbortSignal.timeout(3000) })
          .then(r => r.ok ? r.json() : Promise.reject())
          .then(() => setHealthy(true))
          .catch(() => setHealthy(false));
      };
      check();
      const id = setInterval(check, 5000);
      return () => clearInterval(id);
    }, []);

    const handleLimpia = () => {
      fetch('/limpia', { method: 'POST' }).then(() => setData(EMPTY));
    };

    const p = data;

    return (
      <ThemeProvider theme={theme}>
        <CssBaseline />

        {/* ── AppBar ─────────────────────────────────────────────────── */}
        <AppBar position="sticky" elevation={0}
          sx={{ bgcolor: 'background.paper', borderBottom: '1px solid rgba(255,255,255,0.07)' }}>
          <Toolbar variant="dense">
            <IconButton edge="start" color="inherit" onClick={() => history.back()} sx={{ mr: 1 }}>
              <span className="material-icons">arrow_back</span>
            </IconButton>
            <Typography variant="h6" sx={{ flexGrow: 1, fontWeight: 700, textTransform: 'uppercase' }}>
              {D.name}
            </Typography>
            <Chip
              size="small"
              label={healthy === null ? 'Checking…' : healthy ? 'OK' : 'Sin respuesta'}
              color={healthy === null ? 'default' : healthy ? 'success' : 'error'}
              icon={healthy === null
                ? <span className="material-icons" style={{fontSize:14}}>pending</span>
                : healthy
                  ? <span className="material-icons" style={{fontSize:14}}>check_circle</span>
                  : <span className="material-icons" style={{fontSize:14}}>error</span>}
              sx={{ mr: 1, fontWeight: 600 }}
            />
            <Typography variant="caption" color="text.secondary" sx={{ fontFamily: 'monospace' }}>
              {p.current_time}
            </Typography>
          </Toolbar>
        </AppBar>

        <Box sx={{ p: 2, display: 'flex', flexDirection: 'column', gap: 2 }}>

          {/* ── Calidad señal ─────────────────────────────────────────── */}
          <Card>
            <CardContent>
              <Typography variant="subtitle1" gutterBottom sx={{ fontWeight: 600 }}>
                Calidad de Señal
              </Typography>
              <Stack spacing={2}>
                <SignalBar
                  label="Pantalla"
                  total={p.num_registros_pantalla} ok={p.signals_ok_pantalla}
                  media={p.media_diff_pantalla} max={p.max_diff_pantalla}
                  color="primary"
                />
                <SignalBar
                  label="Batería"
                  total={p.num_registros_bateria} ok={p.signals_ok_bateria}
                  media={p.media_diff_bateria} max={p.max_diff_bateria}
                  color="secondary"
                />
              </Stack>
            </CardContent>
          </Card>

          {/* ── Uso del sistema ───────────────────────────────────────── */}
          <Card>
            <CardContent>
              <Typography variant="subtitle1" gutterBottom sx={{ fontWeight: 600 }}>
                Uso del Sistema
              </Typography>
              <Stack spacing={2}>
                <UsageBar label="CPU"   value={p.cpu_usage_percent}  color="warning" />
                <UsageBar label="Disco" value={p.disk_usage_percent} detail={p.disk_usage_string} color="info" />
                <UsageBar label="RAM"   value={p.ram_usage_percent}  detail={p.ram_usage_string}  color="secondary" />
              </Stack>
            </CardContent>
          </Card>

          {/* ── Detalles ─────────────────────────────────────────────── */}
          <Grid container spacing={2}>
            <Grid item xs={6}>
              <Card sx={{ height: '100%' }}>
                <CardContent>
                  <Typography variant="subtitle2" gutterBottom sx={{ fontWeight: 600 }}>
                    Pantalla
                  </Typography>
                  <DetailRow label="Registros"  value={p.num_registros_pantalla ?? 'N/A'} />
                  <DetailRow label="OK &lt;25ms" value={p.signals_ok_pantalla ?? 'N/A'} />
                  <Divider sx={{ my: 0.75 }} />
                  <DetailRow label="Media"  value={`${fmt(p.media_diff_pantalla)} ms`} />
                  <DetailRow label="Máx"    value={`${fmt(p.max_diff_pantalla)} ms`} />
                  <DetailRow label="Mín"    value={`${fmt(p.min_diff_pantalla)} ms`} />
                </CardContent>
              </Card>
            </Grid>
            <Grid item xs={6}>
              <Card sx={{ height: '100%' }}>
                <CardContent>
                  <Typography variant="subtitle2" gutterBottom sx={{ fontWeight: 600 }}>
                    Batería
                  </Typography>
                  <DetailRow label="Registros"  value={p.num_registros_bateria ?? 'N/A'} />
                  <DetailRow label="OK &lt;25ms" value={p.signals_ok_bateria ?? 'N/A'} />
                  <Divider sx={{ my: 0.75 }} />
                  <DetailRow label="Media"  value={`${fmt(p.media_diff_bateria)} ms`} />
                  <DetailRow label="Máx"    value={`${fmt(p.max_diff_bateria)} ms`} />
                  <DetailRow label="Mín"    value={`${fmt(p.min_diff_bateria)} ms`} />
                </CardContent>
              </Card>
            </Grid>
          </Grid>

          {/* ── Acciones ─────────────────────────────────────────────── */}
          <Button
            variant="outlined"
            color="error"
            fullWidth
            onClick={handleLimpia}
            startIcon={<span className="material-icons">delete_sweep</span>}
          >
            Borrar datos debug
          </Button>

        </Box>
      </ThemeProvider>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  {% endraw %}</script>
</body>
</html>
