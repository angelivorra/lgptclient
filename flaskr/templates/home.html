<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>{{ name }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='favicon-32x32.png') }}">
  <meta name="mobile-web-app-capable" content="yes">
  <style>body { margin: 0; background: #0a0e1a; }</style>
</head>
<body>
  <div id="root"></div>

  <script id="flask-data" type="application/json">
  {
    "name": {{ name | tojson }},
    "is_active": {{ is_active | tojson }},
    "devices": {{ devices | tojson }},
    "config": {{ config | tojson }},
    "current_time": {{ current_time | tojson }},
    "audio": {{ audio | tojson }}
  }
  </script>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@mui/material@5/umd/material-ui.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">{% raw %}
  const {
    createTheme, ThemeProvider, CssBaseline,
    AppBar, Toolbar, Typography, Chip, Box, Paper,
    BottomNavigation, BottomNavigationAction,
    Card, CardContent, CardActionArea,
    Button, IconButton, CircularProgress, Backdrop,
    LinearProgress, Skeleton,
    List, ListItem, ListItemIcon, ListItemText,
    Alert, AlertTitle,
    TextField, Switch, FormControlLabel,
    Grid, Stack, Divider
  } = MaterialUI;

  const theme = createTheme({
    palette: {
      mode: 'dark',
      primary:    { main: '#5c6bc0' },
      secondary:  { main: '#ab47bc' },
      background: { default: '#0a0e1a', paper: '#141929' },
    },
    shape: { borderRadius: 12 },
    typography: { fontFamily: 'Roboto, sans-serif' },
  });

  const D = JSON.parse(document.getElementById('flask-data').textContent);

  // ── Helpers ──────────────────────────────────────────────────────────────

  function post(url, params) {
    return fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams(params),
    });
  }

  // ── Root App ──────────────────────────────────────────────────────────────

  function App() {
    const [tab,        setTab]        = React.useState(0);
    const [fullLoad,   setFullLoad]   = React.useState(false);
    const [btMsg,      setBtMsg]      = React.useState(null);
    const [formDelay,  setFormDelay]  = React.useState(String(D.config?.delay ?? ''));
    const [formDebug,  setFormDebug]  = React.useState(!!D.config?.debug);
    const [formRuido,  setFormRuido]  = React.useState(!!D.config?.ruido);

    return (
      <ThemeProvider theme={theme}>
        <CssBaseline />

        <Backdrop open={fullLoad} sx={{ zIndex: 9999, color: '#fff' }}>
          <CircularProgress color="inherit" />
          <Typography sx={{ ml: 2 }}>Procesando...</Typography>
        </Backdrop>

        {/* ── AppBar ─────────────────────────────────────────────────── */}
        <AppBar position="sticky" elevation={0}
          sx={{ bgcolor: 'background.paper', borderBottom: '1px solid rgba(255,255,255,0.07)' }}>
          <Toolbar variant="dense">
            <Typography variant="h6" sx={{ flexGrow: 1, fontWeight: 700, letterSpacing: 1 }}>
              {D.name}
            </Typography>
            <Chip
              size="small"
              label={D.is_active ? 'Online' : 'Error'}
              color={D.is_active ? 'success' : 'error'}
              sx={{ fontWeight: 600 }}
            />
          </Toolbar>
        </AppBar>

        {/* ── Tab panels ─────────────────────────────────────────────── */}
        <Box sx={{ pb: 9 }}>
          {tab === 0 && <RobotsTab setFullLoad={setFullLoad} btMsg={btMsg} setBtMsg={setBtMsg} />}
          {tab === 1 && <ConfigTab
            formDelay={formDelay} setFormDelay={setFormDelay}
            formDebug={formDebug} setFormDebug={setFormDebug}
            formRuido={formRuido} setFormRuido={setFormRuido}
            setFullLoad={setFullLoad}
          />}
          {tab === 2 && <ServidorTab />}
        </Box>

        {/* ── Bottom Nav ─────────────────────────────────────────────── */}
        <Paper elevation={4} sx={{ position: 'fixed', bottom: 0, left: 0, right: 0, zIndex: 100 }}>
          <BottomNavigation value={tab} onChange={(_, v) => setTab(v)} showLabels
            sx={{ bgcolor: 'background.paper' }}>
            <BottomNavigationAction label="Robots"   icon={<span className="material-icons">smart_toy</span>} />
            <BottomNavigationAction label="Config"   icon={<span className="material-icons">tune</span>} />
            <BottomNavigationAction label="Servidor" icon={<span className="material-icons">dns</span>} />
          </BottomNavigation>
        </Paper>
      </ThemeProvider>
    );
  }

  // ── Tab: Robots ───────────────────────────────────────────────────────────

  function RobotsTab({ setFullLoad, btMsg, setBtMsg }) {
    const [btLoading,    setBtLoading]    = React.useState(false);
    const [devHealth,    setDevHealth]    = React.useState({});

    React.useEffect(() => {
      fetch('/api/devices-health')
        .then(r => r.json())
        .then(list => {
          const map = {};
          list.forEach(d => { map[d.ip] = d.available; });
          setDevHealth(map);
        })
        .catch(() => {});
    }, []);

    const handleBluetooth = () => {
      setBtMsg(null);
      setBtLoading(true);
      fetch('/bluetooth', { method: 'POST' })
        .then(r => r.json())
        .then(data => setBtMsg({ ok: true,  text: data.message || 'Conectado correctamente' }))
        .catch(()  => setBtMsg({ ok: false, text: 'Error al conectar' }))
        .finally(() => setBtLoading(false));
    };

    return (
      <Box sx={{ p: 2 }}>
        <Grid container spacing={2} sx={{ mb: 2 }}>
          {D.devices.map(dev => {
            const available = devHealth[dev.ip];
            const checked   = dev.ip in devHealth;
            return (
              <Grid item xs={6} key={dev.ip}>
                <Card sx={{ height: '100%', opacity: checked && !available ? 0.5 : 1 }}>
                  <CardActionArea
                    disabled={checked && !available}
                    onClick={() => window.location.href = `http://${dev.ip}:8080/robot`}
                    sx={{ display: 'flex', flexDirection: 'column', height: '100%', p: 1 }}>
                    <Box sx={{ position: 'relative', display: 'flex', justifyContent: 'center', pt: 1 }}>
                      <img
                        src={`/static/${dev.name.toLowerCase()}.png`}
                        alt={dev.name}
                        style={{ width: 90, height: 90, objectFit: 'contain' }}
                      />
                      {checked && (
                        <Box sx={{ position: 'absolute', top: 0, right: 0 }}>
                          <span className="material-icons"
                            style={{ fontSize: 14, color: available ? '#66bb6a' : '#ef5350' }}>
                            {available ? 'wifi' : 'wifi_off'}
                          </span>
                        </Box>
                      )}
                    </Box>
                    <CardContent sx={{ textAlign: 'center', py: 1, px: 0 }}>
                      <Typography variant="subtitle2" sx={{ textTransform: 'capitalize' }}>
                        {dev.name}
                      </Typography>
                      <Typography variant="caption" color="text.secondary" sx={{ fontFamily: 'monospace' }}>
                        {dev.ip}
                      </Typography>
                    </CardContent>
                  </CardActionArea>
                </Card>
              </Grid>
            );
          })}
        </Grid>

        <Card>
          <CardContent>
            <Typography variant="subtitle1" gutterBottom sx={{ fontWeight: 600 }}>
              Bluetooth
            </Typography>
            <Box sx={{ display: 'flex', justifyContent: 'center', mb: 1.5 }}>
              <img
                src="/static/8bitdo-micro.png"
                alt="8BitDo Micro"
                style={{ height: 64, objectFit: 'contain', opacity: 0.92 }}
              />
            </Box>
            <Button
              variant="outlined"
              fullWidth
              disabled={btLoading}
              onClick={handleBluetooth}
              startIcon={btLoading
                ? <CircularProgress size={16} />
                : <span className="material-icons">bluetooth</span>}
            >
              Conectar Mando
            </Button>
            {btMsg && (
              <Alert severity={btMsg.ok ? 'success' : 'error'} sx={{ mt: 1 }}>
                {btMsg.text}
              </Alert>
            )}
          </CardContent>
        </Card>
      </Box>
    );
  }

  // ── Tab: Config ───────────────────────────────────────────────────────────

  function ConfigTab({ formDelay, setFormDelay, formDebug, setFormDebug,
                       formRuido, setFormRuido, setFullLoad }) {
    const [formError, setFormError] = React.useState(null);

    const handleSubmit = e => {
      e.preventDefault();
      setFormError(null);
      setFullLoad(true);
      post('/', { delay: formDelay, debug: formDebug ? 'on' : '' })
        .then(r => { if (r.ok) window.location.reload(); else throw new Error(); })
        .catch(() => setFormError('Error al aplicar configuración'))
        .finally(() => setFullLoad(false));
    };

    const handleRuido = e => {
      setFormRuido(e.target.checked);
      post('/ruido', { ruido: e.target.checked });
    };

    return (
      <Box sx={{ p: 2, display: 'flex', flexDirection: 'column', gap: 2 }}>

        <Card>
          <CardContent>
            <Typography variant="subtitle1" gutterBottom sx={{ fontWeight: 600 }}>
              Configuración
            </Typography>
            {formError && <Alert severity="error" sx={{ mb: 2 }}>{formError}</Alert>}
            <form onSubmit={handleSubmit}>
              <Stack spacing={2}>
                <TextField
                  label="Delay (ms)"
                  value={formDelay}
                  onChange={e => setFormDelay(e.target.value)}
                  size="small"
                  fullWidth
                />
                <FormControlLabel
                  control={
                    <Switch
                      checked={formDebug}
                      onChange={e => setFormDebug(e.target.checked)}
                      color="primary"
                    />
                  }
                  label="Debug"
                />
                <Button type="submit" variant="contained" fullWidth>
                  Aplicar
                </Button>
              </Stack>
            </form>
          </CardContent>
        </Card>

        <Card>
          <CardContent>
            <Typography variant="subtitle1" gutterBottom sx={{ fontWeight: 600 }}>
              Motores
            </Typography>
            <FormControlLabel
              control={
                <Switch
                  checked={formRuido}
                  onChange={handleRuido}
                  color="secondary"
                />
              }
              label="Ruido motores"
            />
          </CardContent>
        </Card>

        <Card>
          <CardContent>
            <Typography variant="subtitle1" gutterBottom sx={{ fontWeight: 600 }}>
              Sistema
            </Typography>
            <Typography variant="body2" color="text.secondary" sx={{ fontFamily: 'monospace' }}>
              {D.current_time}
            </Typography>
            {D.audio && (
              <>
                <Divider sx={{ my: 1.5 }} />
                <Typography variant="caption" color="text.secondary">Audio</Typography>
                <Box component="pre" sx={{
                  fontSize: '0.68rem', overflowX: 'auto', mt: 0.5,
                  color: 'text.secondary', whiteSpace: 'pre-wrap',
                  bgcolor: 'rgba(0,0,0,0.3)', p: 1, borderRadius: 1
                }}>
                  {D.audio}
                </Box>
              </>
            )}
          </CardContent>
        </Card>

      </Box>
    );
  }

  // ── Tab: Servidor ─────────────────────────────────────────────────────────

  function ServidorTab() {
    const [status,  setStatus]  = React.useState(null);
    const [errors,  setErrors]  = React.useState(null);
    const [loading, setLoading] = React.useState(true);

    const load = () => {
      setLoading(true);
      Promise.all([
        fetch('/api/service-status').then(r => r.json()),
        fetch('/api/errors').then(r => r.json()),
      ])
        .then(([s, e]) => {
          setStatus(s);
          setErrors(e.errors || null);
        })
        .finally(() => setLoading(false));
    };

    React.useEffect(() => { load(); }, []);

    if (loading) return (
      <Box sx={{ p: 2, display: 'flex', flexDirection: 'column', gap: 2 }}>
        <Skeleton variant="rounded" height={72} sx={{ bgcolor: 'rgba(255,255,255,0.06)' }} />
        <Skeleton variant="rounded" height={140} sx={{ bgcolor: 'rgba(255,255,255,0.06)' }} />
      </Box>
    );

    return (
      <Box sx={{ p: 2, display: 'flex', flexDirection: 'column', gap: 2 }}>

        <Card>
          <CardContent sx={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
            <Box>
              <Typography variant="subtitle1" sx={{ fontWeight: 600 }}>server-midi</Typography>
              <Typography variant="caption" color="text.secondary">servicio MIDI TCP</Typography>
            </Box>
            <Chip
              label={status?.is_active ? 'Activo' : 'Inactivo'}
              color={status?.is_active ? 'success' : 'error'}
              icon={<span className="material-icons" style={{ fontSize: 16 }}>
                {status?.is_active ? 'check_circle' : 'error'}
              </span>}
            />
          </CardContent>
        </Card>

        <Card>
          <CardContent>
            <Typography variant="subtitle1" gutterBottom sx={{ fontWeight: 600 }}>
              Clientes TCP&nbsp;
              <Chip
                label={status?.clients?.length ?? 0}
                size="small"
                color={status?.clients?.length > 0 ? 'primary' : 'default'}
              />
            </Typography>
            {!status?.clients?.length ? (
              <Typography variant="body2" color="text.secondary">
                Sin clientes conectados
              </Typography>
            ) : (
              <List dense disablePadding>
                {status.clients.map((c, i) => (
                  <ListItem key={i} disablePadding sx={{ py: 0.25 }}>
                    <ListItemIcon sx={{ minWidth: 28 }}>
                      <span className="material-icons"
                        style={{ fontSize: 10, color: '#66bb6a' }}>circle</span>
                    </ListItemIcon>
                    <ListItemText
                      primary={
                        <Typography variant="body2" sx={{ fontFamily: 'monospace' }}>
                          {c.ip}:{c.port}
                        </Typography>
                      }
                    />
                  </ListItem>
                ))}
              </List>
            )}
          </CardContent>
        </Card>

        {errors && (
          <Alert severity="error" variant="filled">
            <AlertTitle>Errores del servicio</AlertTitle>
            <Box component="pre" sx={{
              fontSize: '0.68rem', whiteSpace: 'pre-wrap',
              mt: 0.5, overflow: 'auto', maxHeight: 200
            }}>
              {errors}
            </Box>
          </Alert>
        )}

        <Button
          variant="outlined"
          fullWidth
          onClick={load}
          startIcon={<span className="material-icons">refresh</span>}
        >
          Actualizar
        </Button>

      </Box>
    );
  }

  // ── Mount ─────────────────────────────────────────────────────────────────

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  {% endraw %}</script>
</body>
</html>
